<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Popup Window</title>

    <!-- BOXIXON ICON-->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="d-flex align-items-center justify-content-center vh-100 flex-column">
        <button class="btn btn-warning rounded-pill px-5 shadow open-btn">CREATE ACCOUNT</button>
    </div>

    <div class="container mt-4 vh-100 rounded d-flex  justify-content-center align-items-center">

        <!-- SIGN UP FORM -->
        <div class="d-flex justify-content-center align-items-center pb-5 signupform rounded">
            <form action="">
                <div class="ps-3 py-3 text-warning text-center">CREATE NEW ACCOUNT</div>
                <div class="mb-3">
                    <i class='icon bx bx-user mt-3 rounded-circle mt-4 bg-warning py-1 px-1'></i>
                    <input type="text" name="email" id="email" class="form-control-sm rounded-pill" placeholder="Full Name">
                </div>

                <div class="mb-3">
                    <i class='icon bx bx-envelope mt-3 rounded-circle mt-4 bg-warning py-1 px-1'></i>
                    <input type="email" name="email" id="email" class="form-control-sm rounded-pill " placeholder="Email">
                </div>

                <div class="mb-3">
                    <i class='icon  bx bx-lock-alt mt-3 rounded-circle mt-4 bg-warning py-1 px-1'></i>
                    <input type="password" name="password " id="password " class="form-control-sm rounded-pill " placeholder="Password ">
                </div>

                <div class="mb-3">
                    <i class='icon  bx bx-lock-open-alt mt-3 rounded-circle mt-4 bg-warning py-1 px-1'></i>
                    <input type="password" name="confirmPassword " id="confrimPassword " class="form-control-sm rounded-pill " placeholder="Confirm Password ">
                </div>

                <div class="mb-3">
                    <i class='icon  bx bx-phone-call mt-3 rounded-circle mt-4 bg-warning py-1 px-1'></i>
                    <input type="phone" name="phone" id="phone " class="form-control-sm rounded-pill " placeholder="Phone Number">
                </div>

                <div class="form-check mb-3 ms-3 text-white">
                    <input type="radio" name="checkbox" id="checkbox" class="form-check-input">Remember me
                </div>

                <div class="mb-3 button text-center rounded-pill">
                    <div class="btn btn-warning rounded-pill">REGISTER</div>
                </div>

                <div class="text-white text-center">
                    <p>Already have an account &nbsp; <a href="" class="text-warning" id="signup">Login</a></p>
                </div>
            </form>
        </div>
    </div>

    <div class="container mt-4 vh-100 rounded d-flex  justify-content-center align-items-center">

        <!-- Login Form -->
        <div class="d-flex justify-content-center align-items-center pb-5 login rounded">
            <form action="">
                <div class="ps-3 py-3 text-warning text-center">LOGIN YOUR ACCOUNT</div>

                <div class="mb-3">
                    <i class='icon bx bx-envelope mt-3 rounded-circle mt-4 bg-warning py-1 px-1'></i>
                    <input type="email" name="email" id="email" class="form-control-sm rounded-pill " placeholder="Email">
                </div>

                <div class="mb-3">
                    <i class='icon  bx bx-lock-alt mt-3 rounded-circle mt-4 bg-warning py-1 px-1'></i>
                    <input type="password" name="password " id="password " class="form-control-sm rounded-pill " placeholder="Password ">
                </div>

                <div class="form-check mb-3 ms-3 text-white">
                    <a href="" id="forgotpswd" class="text-warning">Forgot Password</a>
                </div>

                <div class="mb-3 button text-center rounded-pill">
                    <div class="btn btn-warning rounded-pill">LOGIN</div>
                </div>

                <div class="text-white text-center">
                    <p>Not a member &nbsp; <a href="" class="text-warning" id="login">Sign in Now</a></p>
                </div>
            </form>
        </div>
    </div>
    <!-- ANIMATION SCROLL LIBRARAY -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js "></script>

    <!-- BOOTSTRAP JAVASCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js "></script>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>
</body>
</body>

</html>
